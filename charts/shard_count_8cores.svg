<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img"><title>Shard count vs throughput</title><desc>Throughput in millions of ops/sec versus shard count, balanced 50/50 mix, uniform keys, 8 cores; the curve flattens past 256 shards.</desc><text x="20" y="26" font-size="15" font-weight="500" fill="#2C2C2A">how many shards? &#8212; balanced mix, uniform, 8 cores</text><text x="20" y="44" font-size="12" fill="#5F5E5A">more shards &#8594; less lock contention, with sharp diminishing returns past 256</text><line x1="58.0" y1="376.0" x2="700.0" y2="376.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="52.0" y="379.0" font-size="10" fill="#5F5E5A" text-anchor="end">0</text><line x1="58.0" y1="314.0" x2="700.0" y2="314.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="52.0" y="317.0" font-size="10" fill="#5F5E5A" text-anchor="end">11</text><line x1="58.0" y1="252.0" x2="700.0" y2="252.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="52.0" y="255.0" font-size="10" fill="#5F5E5A" text-anchor="end">22</text><line x1="58.0" y1="190.0" x2="700.0" y2="190.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="52.0" y="193.0" font-size="10" fill="#5F5E5A" text-anchor="end">33</text><line x1="58.0" y1="128.0" x2="700.0" y2="128.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="52.0" y="131.0" font-size="10" fill="#5F5E5A" text-anchor="end">44</text><line x1="58.0" y1="66.0" x2="700.0" y2="66.0" stroke="rgba(120,120,120,0.18)" stroke-width="1"/><text x="52.0" y="69.0" font-size="10" fill="#5F5E5A" text-anchor="end">55</text><text x="58.0" y="394.0" font-size="11" fill="#5F5E5A" text-anchor="middle">1</text><text x="186.4" y="394.0" font-size="11" fill="#5F5E5A" text-anchor="middle">16</text><text x="314.8" y="394.0" font-size="11" fill="#5F5E5A" text-anchor="middle">64</text><text x="443.2" y="394.0" font-size="11" fill="#5F5E5A" 